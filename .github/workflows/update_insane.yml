name: Update Insane Lineup from Artifact
on:
  repository_dispatch:
    types: [update-insane]

permissions:
  contents: write

jobs:
  update-insane:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clean insane folder
        run: |
          rm -rf public/insane/*
          echo "Cleaned public/insane folder"

      - name: Download and extract artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_URL="${{ github.event.client_payload.message }}"
          echo "Processing run URL: $RUN_URL"

          # Extract owner, repo, and run_id from URL
          if [[ $RUN_URL =~ github\.com/([^/]+)/([^/]+)/actions/runs/([0-9]+) ]]; then
            OWNER="${BASH_REMATCH[1]}"
            REPO="${BASH_REMATCH[2]}"
            RUN_ID="${BASH_REMATCH[3]}"

            echo "Owner: $OWNER, Repo: $REPO, Run ID: $RUN_ID"

            # Download artifact using GitHub CLI
            gh run download $RUN_ID --repo "$OWNER/$REPO" --name insane-lineup-wasm --dir public/insane

            echo "Downloaded and extracted artifact to public/insane"
          else
            echo "Error: Invalid GitHub Actions run URL format"
            exit 1
          fi

      - name: Fix resource paths in index.html
        run: |
          python3 scripts/fix_insane_paths.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/insane/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update Insane Lineup files from artifact"
            git push
          fi
